<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0a050"/>
      <stop offset="100%" stop-color="#e8734a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce8d0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Inner subtle border -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Letter S -->
  <path d="M11 18c0-1.8 1.4-3 3.5-3h3c2.1 0 3.5 1.2 3.5 3s-1.4 3-3.5 3h-3c-2.1 0-3.5 1.2-3.5 3s1.4 3 3.5 3h3c2.1 0 3.5-1.2 3.5-3" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Letter D -->
  <path d="M24 15h3c3 0 5.5 2.5 5.5 5.5S30 26 27 26h-3V15z" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Letter T -->
  <path d="M35 15h6M38 15v11" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Accent dot -->
  <circle cx="24" cy="36" r="2.5" fill="white" fill-opacity="0.9"/>
  <!-- Corner accents -->
  <path d="M7 7l4 0M7 7l0 4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M41 41l-4 0M41 41l0-4" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
