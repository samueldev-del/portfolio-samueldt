<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffbd6e"/>
      <stop offset="45%" stop-color="#f08b4b"/>
      <stop offset="100%" stop-color="#df5f3b"/>
    </linearGradient>
    <linearGradient id="letter" x1="18" y1="18" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff4e2"/>
    </linearGradient>
    <radialGradient id="shine" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(20 16) rotate(33) scale(38 33)">
      <stop stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#shine)"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="14.5" fill="none" stroke="white" stroke-opacity="0.28"/>

  <g filter="url(#glow)">
    <text x="32" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="32" fill="url(#letter)">SD</text>
  </g>
</svg>
