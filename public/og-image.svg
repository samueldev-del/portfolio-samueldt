<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="1080" y2="590" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#130f1f"/>
      <stop offset="55%" stop-color="#181325"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </linearGradient>
    <radialGradient id="warm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 150) rotate(28) scale(540 340)">
      <stop offset="0" stop-color="#f0a050" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f0a050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 480) rotate(210) scale(520 300)">
      <stop offset="0" stop-color="#19b1ba" stop-opacity="0.33"/>
      <stop offset="1" stop-color="#19b1ba" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbf73"/>
      <stop offset="1" stop-color="#e8734a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="28" fill="url(#warm)"/>
  <rect width="1200" height="630" rx="28" fill="url(#cool)"/>

  <g opacity="0.85">
    <circle cx="105" cy="87" r="8" fill="#f0a050"/>
    <circle cx="135" cy="87" r="8" fill="#19b1ba"/>
    <circle cx="165" cy="87" r="8" fill="#f6cf92"/>
