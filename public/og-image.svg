  <rect x="90" y="120" width="1020" height="390" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.11)"/>

  <text x="130" y="230" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="700">
